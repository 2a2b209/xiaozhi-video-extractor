# 微信云托管配置文件
# 文档: https://developers.weixin.qq.com/miniprogram/dev/wxcloudrun/src/quickstart/custom/

# 服务配置
name: xiaozhi-video-extractor
description: 小智万能提取去水印 - 后端API服务

# 容器配置
containerPort: 80
cpu: 0.25
memory: 512MB
minNum: 0
maxNum: 5

# 环境变量
envVariables:
  NODE_ENV: production

# 健康检查
healthCheck:
  path: /api/health
  periodSeconds: 10
  timeoutSeconds: 5
